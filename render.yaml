databases:
  - name: medqr-db
    databaseName: medqr
    user: medqr_user
    plan: free

services:
  - type: web
    name: medqr-web
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn medical_qr.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medqr-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
