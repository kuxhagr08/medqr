{% extends "base.html" %}

{% block title %}Login - MedQR{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
        
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}
                <div class="alert alert-error">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
            <input type="hidden" name="next" value="{{ next|default:'/dashboard/' }}">
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary);">Sign up</a>
        </p>
    </div>
</div>

<script>
    // Add css classes to django form fields
    document.querySelectorAll('input').forEach(el => {
        if(el.type !== 'hidden' && el.type !== 'submit') {
            el.classList.add('form-control');
        }
    });
</script>
{% endblock %}
